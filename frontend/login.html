<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Raiko</title>
  <meta name="description" content="Sign in to Raiko — your unified AI platform." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0A0A0A;
      --white: #FAFAF8;
      --yellow: #FFE400;
      --gray: #3A3835;
      --gray-lt: #C0BEB8;
    }
    html, body {
      height: 100%; background: var(--black); color: var(--white);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }

    /* ── Two-column split layout ── */
    .page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
    }

    /* ── Left panel — form side ── */
    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      position: relative;
      z-index: 1;
      overflow-y: auto;
    }

    .left-panel-inner {
      width: 100%;
      max-width: 400px;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    /* Subtle yellow dot pattern on left panel only */
    .left-panel::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,228,0,0.14) 1.2px, transparent 1.3px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .card {
      width: 100%; max-width: 400px;
      position: relative; z-index: 1;
      animation: card-in 0.3s ease;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
    }
    .logo-orb {
      width: 108px; height: 108px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-orb img { width: 84px; height: 84px; display: block; }
    .logo-name { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--yellow); }

    .tabs {
      display: flex; gap: 0;
      border: 2px solid var(--yellow);
      border-radius: 2px; overflow: hidden;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1; padding: 9px;
      border: none; border-right: 1px solid var(--yellow);
      background: transparent; color: var(--gray-lt);
      font-size: 12px; font-weight: 700;
      cursor: pointer; transition: background 0.12s;
      text-transform: uppercase; letter-spacing: 0.06em;
      font-family: 'Space Grotesk', sans-serif;
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn.active { background: var(--yellow); color: var(--black); }
    .tab-btn:hover:not(.active) { background: rgba(255,228,0,0.1); }

    .form { display: none; flex-direction: column; gap: 14px; }
    .form.active { display: flex; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    label {
      font-size: 11px; font-weight: 700; color: var(--gray-lt);
      text-transform: uppercase; letter-spacing: 0.08em;
      font-family: 'JetBrains Mono', monospace;
    }

    input {
      width: 100%; padding: 10px 12px;
      border-radius: 2px; border: 2px solid var(--gray);
      background: #161616; color: var(--white);
      font-size: 13px; font-family: 'Space Grotesk', sans-serif;
      outline: none; transition: border-color 0.12s;
    }
    input:focus { border-color: var(--yellow); }
    input::placeholder { color: var(--gray); }

    .btn-submit {
      width: 100%; padding: 12px;
      border-radius: 2px; border: 2px solid var(--black);
      background: var(--yellow); color: var(--black);
      font-size: 13px; font-weight: 800;
      cursor: pointer; transition: box-shadow 0.12s, transform 0.12s;
      box-shadow: 4px 4px 0 var(--black);
      margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em;
      font-family: 'Space Grotesk', sans-serif;
    }
    .btn-submit:hover { box-shadow: 6px 6px 0 var(--black); transform: translate(-1px,-1px); }
    .btn-submit:active { transform: translate(0,0); box-shadow: 2px 2px 0 var(--black); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .alert {
      padding: 10px 12px; border-radius: 2px;
      font-size: 12px; font-weight: 600; display: none;
      font-family: 'JetBrains Mono', monospace;
    }
    .alert.error   { background: #1a0000; border: 2px solid #cc0000; color: #ff8080; display: block; }
    .alert.success { background: #0a1a00; border: 2px solid #22c55e; color: #86efac; display: block; }

    .bonus-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,228,0,0.08);
      border: 2px solid rgba(255,228,0,0.3);
      border-radius: 2px; padding: 10px 12px;
      font-size: 12px; color: var(--yellow); margin-top: 2px;
    }

    .footer-note { text-align: center; margin-top: 18px; font-size: 11px; color: var(--gray-lt); }

    .explore-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: absolute;
      right: -268px;
      bottom: 8px;
      padding: 11px 14px;
      border: 2px solid var(--gray-lt);
      background: transparent;
      color: var(--white);
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: 'JetBrains Mono', monospace;
      box-shadow: 4px 4px 0 rgba(255,255,255,0.1);
      transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s, color 0.12s;
      z-index: 1;
    }

    .explore-link:hover {
      border-color: var(--yellow);
      color: var(--yellow);
      box-shadow: 6px 6px 0 rgba(255,228,0,0.2);
      transform: translate(-1px, -1px);
    }

    /* ── Right panel — image side ── */
    .right-panel {
      position: relative;
      overflow: hidden;
      border-left: 3px solid var(--yellow);
    }

    .right-panel img,
    .right-panel video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .right-panel-media {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    .right-panel-media.active {
      opacity: 1;
      z-index: 1;
    }

    /* Yellow overlay strip at bottom */
    .right-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,10,0.55) 0%, transparent 45%);
      pointer-events: none;
    }

    .right-panel-label {
      position: absolute;
      bottom: 52px;
      left: 28px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .right-panel-label span:first-child {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .right-panel-label span:last-child {
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .right-panel-progress {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 24px;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .rpp-segment {
      height: 8px;
      border: 2px solid var(--yellow);
      background: rgba(10,10,10,0.44);
      overflow: hidden;
      position: relative;
    }

    .rpp-fill {
      height: 100%;
      width: 0%;
      background: var(--yellow);
      transition: width 0.2s linear;
    }

    /* ── Responsive: stack on small screens ── */
    @media (max-width: 820px) {
      .page { grid-template-columns: 1fr; }
      .right-panel { display: none; }
      .left-panel { padding: 40px 24px; }
      .left-panel-inner { max-width: 400px; }
      .explore-link {
        position: static;
        margin-top: 18px;
        align-self: flex-end;
      }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- LEFT: Form -->
  <div class="left-panel">
    <div class="left-panel-inner">
    <div class="card">
      <div class="logo">
        <div class="logo-orb"><img src="raiko-logo-trans.png" alt="Raiko logo" /></div>
        <div class="logo-name">Raiko</div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Alert -->
      <div class="alert" id="alert"></div>

      <!-- Login Form -->
      <form class="form active" id="form-login" onsubmit="handleLogin(event)">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-submit" id="login-btn">Sign In →</button>
      </form>

      <!-- Signup Form -->
      <form class="form" id="form-signup" onsubmit="handleSignup(event)">
        <div class="field">
          <label for="signup-username">Username</label>
          <input type="text" id="signup-username" placeholder="yourname" required minlength="3" autocomplete="username" />
        </div>
        <div class="field">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="signup-password">Password <span style="font-weight:400;color:var(--gray-lt)">(min 6 chars)</span></label>
          <input type="password" id="signup-password" placeholder="••••••••" required minlength="6" autocomplete="new-password" />
        </div>

        <div class="bonus-badge">
          <span>⚡</span>
          Get <strong>20 free credits</strong> when you sign up — no card needed!
        </div>

        <button type="submit" class="btn-submit" id="signup-btn">Create Account →</button>
      </form>

      <p class="footer-note">By continuing you agree to our Terms of Service.</p>
    </div>
    <a class="explore-link" href="/">
      <span>→</span>
      <span>Explore</span>
    </a>
    </div>
  </div>

  <!-- RIGHT: Image -->
  <div class="right-panel">
    <img class="right-panel-media active" id="right-panel-image" src="beer-cat.jpg" alt="Raiko preview" />
    <video class="right-panel-media" id="right-panel-video" src="dashboard-showcase/top-showcase/seedance-explore/s-video9.mp4" muted loop playsinline preload="auto"></video>
    <div class="right-panel-progress" aria-hidden="true">
      <div class="rpp-segment"><div class="rpp-fill" id="rpp-fill-1"></div></div>
      <div class="rpp-segment"><div class="rpp-fill" id="rpp-fill-2"></div></div>
    </div>
    <div class="right-panel-label">
      <span>Powered by Raiko</span>
      <span>Generate anything.<br>No limits.</span>
    </div>
  </div>

</div>

<script>
  // If already logged in → redirect
  if (localStorage.getItem('magai_token')) {
    window.location.href = '/';
  }

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('form-login').classList.toggle('active', tab === 'login');
    document.getElementById('form-signup').classList.toggle('active', tab === 'signup');
    clearAlert();
  }

  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type}`;
  }
  function clearAlert() {
    const el = document.getElementById('alert');
    el.className = 'alert';
    el.textContent = '';
  }

  async function handleLogin(e) {
    e.preventDefault();
    clearAlert();
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { showAlert(data.detail || 'Login failed'); return; }

      localStorage.setItem('magai_token', data.access_token);
      localStorage.setItem('magai_user', JSON.stringify(data.user));
      window.location.href = '/';
    } catch {
      showAlert('Network error. Try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In →';
    }
  }

  async function handleSignup(e) {
    e.preventDefault();
    clearAlert();
    const btn = document.getElementById('signup-btn');
    btn.disabled = true;
    btn.textContent = 'Creating account…';

    const username = document.getElementById('signup-username').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;

    try {
      const res = await fetch('/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password }),
      });
      const data = await res.json();
      if (!res.ok) { showAlert(data.detail || 'Signup failed'); return; }

      localStorage.setItem('magai_token', data.access_token);
      localStorage.setItem('magai_user', JSON.stringify(data.user));
      showAlert('Account created! 🎉 You got 20 free credits!', 'success');
      setTimeout(() => window.location.href = '/', 1200);
    } catch {
      showAlert('Network error. Try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account →';
    }
  }

  (function initRightPanelPreview() {
    const previewSets = [
      {
        image: 'beer-cat.jpg',
        video: 'dashboard-showcase/top-showcase/seedance-explore/s-video9.mp4',
        alt: 'Raiko cat preview'
      },
      {
        image: 'dashboard-showcase/seedream-explore/item-20/image.jpg',
        video: 'dashboard-showcase/top-showcase/seedance-explore/s-video10.mp4',
        alt: 'Raiko girl cat preview'
      }
    ];

    const image = document.getElementById('right-panel-image');
    const video = document.getElementById('right-panel-video');
    const fill1 = document.getElementById('rpp-fill-1');
    const fill2 = document.getElementById('rpp-fill-2');
    if (!image || !video || !fill1 || !fill2) return;

    const activePreview = previewSets[Math.floor(Math.random() * previewSets.length)];
    image.src = activePreview.image;
    image.alt = activePreview.alt;
    video.src = activePreview.video;
    video.load();

    const STAGE_MS = 5000;
    let start = performance.now();

    function tick(now) {
      const elapsed = now - start;
      const stage = Math.floor(elapsed / STAGE_MS) % 2;
      const stageProgress = ((elapsed % STAGE_MS) / STAGE_MS) * 100;

      if (stage === 0) {
        image.classList.add('active');
        video.classList.remove('active');
        if (!video.paused) video.pause();
        fill1.style.width = `${stageProgress}%`;
        fill2.style.width = '0%';
      } else {
        image.classList.remove('active');
        video.classList.add('active');
        if (video.paused) {
          video.currentTime = 0;
          video.play().catch(() => {});
        }
        fill1.style.width = '100%';
        fill2.style.width = `${stageProgress}%`;
      }

      if (elapsed >= STAGE_MS * 2) {
        fill1.style.width = '0%';
        fill2.style.width = '0%';
        start = now;
      }
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  })();
</script>
</body>
</html>
