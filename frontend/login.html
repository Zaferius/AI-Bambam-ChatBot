<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — MagAI</title>
  <meta name="description" content="Sign in to MagAI — your unified AI platform." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0a0f;
      --surface: #0f0f18;
      --s2:      #14141f;
      --border:  #1e1e32;
      --border2: #2a2a42;
      --accent:  #7c3aed;
      --accent2: #6d28d9;
      --glow:    rgba(124,58,237,0.35);
      --t1: #f1f0ff;
      --t2: #a89fc8;
      --t3: #6b6690;
      --green: #22c55e;
      --red:   #ef4444;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--t1);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
    }
    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      top: -100px; left: 50%; transform: translateX(-50%);
      pointer-events: none;
      animation: blob-move 8s ease-in-out infinite alternate;
    }
    @keyframes blob-move {
      from { top: -100px; }
      to   { top: 50px; }
    }

    .page {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; position: relative; z-index: 1;
    }

    .card {
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5), 0 0 60px rgba(124,58,237,0.1);
      animation: card-in 0.4s ease;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 8px;
    }
    .logo-orb {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #a855f7, #6366f1);
      box-shadow: 0 0 30px rgba(124,58,237,0.6);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 20px rgba(124,58,237,0.5); }
      50%      { box-shadow: 0 0 40px rgba(168,85,247,0.8); }
    }
    .logo-name {
      font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #c4b5fd, #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .tagline { color: var(--t2); font-size: 14px; margin-bottom: 32px; }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1; padding: 9px;
      border-radius: 7px; border: none;
      background: transparent; color: var(--t2);
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s ease;
    }
    .tab-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 12px var(--glow);
    }

    /* Forms */
    .form { display: none; flex-direction: column; gap: 16px; }
    .form.active { display: flex; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 12px; font-weight: 600; color: var(--t2); }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--border2);
      background: var(--s2);
      color: var(--t1);
      font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--t3); }

    .btn-submit {
      width: 100%;
      padding: 13px;
      border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 20px var(--glow);
      margin-top: 4px;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 30px var(--glow); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider { position: relative; text-align: center; margin: 4px 0; }
    .divider::before {
      content: ''; position: absolute; top: 50%; left: 0; right: 0;
      height: 1px; background: var(--border);
    }
    .divider span {
      position: relative; background: var(--surface);
      padding: 0 12px; font-size: 12px; color: var(--t3);
    }

    /* Error/success */
    .alert {
      padding: 12px 14px;
      border-radius: 10px; font-size: 13px;
      display: none;
    }
    .alert.error   { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; display: block; }
    .alert.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; display: block; }

    .bonus-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px; color: #c4b5fd;
      margin-top: 4px;
    }
    .bonus-badge span { font-size: 18px; }

    .footer-note { text-align: center; margin-top: 24px; font-size: 12px; color: var(--t3); }
  </style>
</head>
<body>

<div class="page">
  <div class="card">
    <div class="logo">
      <div class="logo-orb"></div>
      <div class="logo-name">MagAI</div>
    </div>
    <p class="tagline">Chat · Generate · Create — all in one place</p>

    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Alert -->
    <div class="alert" id="alert"></div>

    <!-- Login Form -->
    <form class="form active" id="form-login" onsubmit="handleLogin(event)">
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-submit" id="login-btn">Sign In →</button>
    </form>

    <!-- Signup Form -->
    <form class="form" id="form-signup" onsubmit="handleSignup(event)">
      <div class="field">
        <label for="signup-username">Username</label>
        <input type="text" id="signup-username" placeholder="yourname" required minlength="3" autocomplete="username" />
      </div>
      <div class="field">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="signup-password">Password <span style="font-weight:400;color:var(--t3)">(min 6 chars)</span></label>
        <input type="password" id="signup-password" placeholder="••••••••" required minlength="6" autocomplete="new-password" />
      </div>

      <div class="bonus-badge">
        <span>⚡</span>
        Get <strong>20 free credits</strong> when you sign up — no card needed!
      </div>

      <button type="submit" class="btn-submit" id="signup-btn">Create Account →</button>
    </form>

    <p class="footer-note">By continuing you agree to our Terms of Service.</p>
  </div>
</div>

<script>
  // If already logged in → redirect
  if (localStorage.getItem('magai_token')) {
    window.location.href = '/';
  }

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('form-login').classList.toggle('active', tab === 'login');
    document.getElementById('form-signup').classList.toggle('active', tab === 'signup');
    clearAlert();
  }

  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type}`;
  }
  function clearAlert() {
    const el = document.getElementById('alert');
    el.className = 'alert';
    el.textContent = '';
  }

  async function handleLogin(e) {
    e.preventDefault();
    clearAlert();
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { showAlert(data.detail || 'Login failed'); return; }

      localStorage.setItem('magai_token', data.access_token);
      localStorage.setItem('magai_user', JSON.stringify(data.user));
      window.location.href = '/';
    } catch {
      showAlert('Network error. Try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In →';
    }
  }

  async function handleSignup(e) {
    e.preventDefault();
    clearAlert();
    const btn = document.getElementById('signup-btn');
    btn.disabled = true;
    btn.textContent = 'Creating account…';

    const username = document.getElementById('signup-username').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;

    try {
      const res = await fetch('/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password }),
      });
      const data = await res.json();
      if (!res.ok) { showAlert(data.detail || 'Signup failed'); return; }

      localStorage.setItem('magai_token', data.access_token);
      localStorage.setItem('magai_user', JSON.stringify(data.user));
      showAlert('Account created! 🎉 You got 20 free credits!', 'success');
      setTimeout(() => window.location.href = '/', 1200);
    } catch {
      showAlert('Network error. Try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account →';
    }
  }
</script>
</body>
</html>
