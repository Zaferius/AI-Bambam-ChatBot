<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPEG to PNG Dönüştürücü</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>JPEG'den PNG'ye Dönüştürücü</h1>
        <p>Lütfen dönüştürmek istediğiniz JPEG dosyasını yükleyin:</p>
        <input type="file" id="fileInput" accept="image/jpeg">
        <button id="convertButton">Dönüştür</button>
        <div id="output" class="output"></div>
    </div>
</body>
</html>
