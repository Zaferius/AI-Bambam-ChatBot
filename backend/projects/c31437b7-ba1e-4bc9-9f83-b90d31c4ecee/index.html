<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Resim Dönüştürme Aracı</title>
</head>
<body>
    <div class="container">
        <h1>Resim Dönüştürme Aracı</h1>
        <form id="conversion-form">
            <label for="file-input">Dosyanızı seçin:</label>
            <input type="file" id="file-input" accept=".jpeg, .jpg, .png" required>
            <br>
            <label for="conversion-type">Dönüşüm tipi seçin:</label>
            <select id="conversion-type">
                <option value="jpeg-to-png">JPEG'den PNG'ye</option>
                <option value="png-to-jpeg">PNG'den JPEG'e</option>
            </select>
            <br>
            <button type="submit">Dönüştür</button>
        </form>
        <div id="result"></div>
    </div>
</body>
</html>
