<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle Tarzı To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="to-do-list">
        <header>
            <h1>Bambam Süper</h1>
        </header>
        <main>
            <form id="task-form">
                <input type="text" id="task-input" placeholder="Yeni görev girin..." required>
                <button type="submit">Ekle</button>
            </form>
            <ul id="task-list">
                <!-- Görevler eklenecek -->
            </ul>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
