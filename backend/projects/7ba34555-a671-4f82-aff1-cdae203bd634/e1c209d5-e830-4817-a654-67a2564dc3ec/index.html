<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle Art To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 class="title">Görev Listem</h1>
    </header>
    <main>
        <section class="add-task">
            <input type="text" id="task-input" placeholder="Yeni görev ekle..." aria-label="Yeni görev ekle"/>
            <button id="add-task-btn">Ekle</button>
        </section>
        <ul id="task-list" class="task-list">
            <!-- Görevler buraya eklenecek -->
        </ul>
    </main>
    <script src="script.js"></script>
</body>
</html>
