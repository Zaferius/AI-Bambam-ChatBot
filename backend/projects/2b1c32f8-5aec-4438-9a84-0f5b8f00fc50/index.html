<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görsel Yükleme Sitesi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-green-500 flex items-center justify-center h-screen">
    <div class="container mx-auto p-4">
        <h1 class="text-white text-2xl mb-4 text-center">Görsel Yükle</h1>
        <input type="file" id="fileInput" class="border border-white p-2 mb-4 text-white bg-green-700 cursor-pointer">
        <div id="preview" class="flex justify-center">
            <img id="imagePreview" src="" alt="Görsel Önizleme" class="hidden max-w-xs rounded-lg shadow-lg">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
