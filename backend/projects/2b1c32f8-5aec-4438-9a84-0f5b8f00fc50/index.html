<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görsel Yükleme Sitesi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-300 flex items-center justify-center h-screen">
    <div class="text-center mb-4">
        <h2 class="text-yellow-500 text-lg">Made by Bambam AI.</h2>
    </div>
    <div class="container p-4">
        <h1 class="text-yellow-500 text-2xl mb-4 text-center">Görsel Yükle</h1>
        <input type="file" id="fileInput" class="file-input mb-4" accept="image/*">
        <div id="preview" class="flex justify-center">
            <img id="imagePreview" src="" alt="Görsel Önizleme" class="hidden max-w-xs rounded-lg border-4 border-white">
        </div>
    </div>
    <script src="script.js"></script>

    <!-- Auto-generated missing elements -->
    <img id="previewDescription" style="display:none;max-width:100%;" />
</body>
</html>
