name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build . -t upload-zone

      - name: Push Docker image
        run: docker push <your-docker-repo>/upload-zone

      - name: Deploy to server
        run: ssh <user>@<server-ip> 'docker pull <your-docker-repo>/upload-zone && docker run -d -p 5000:5000 <your-docker-repo>/upload-zone'