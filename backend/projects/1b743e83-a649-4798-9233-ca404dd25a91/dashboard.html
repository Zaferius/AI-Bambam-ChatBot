<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Zone - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Hoş Geldiniz!</h1>
    </header>
    <main>
        <section>
            <h2>Kalan Krediler: <span id="remaining-credits">100</span></h2>
            <h2>Seçili AI Modeli: <span id="selected-model">Model A</span></h2>
            <h2>Son Kullanım Geçmişi: </h2>
            <ul id="usage-history">
                <!-- Kullanım geçmişi burada bir liste ile gösterilecek -->
            </ul>
            <button onclick="startNewChat()" class="btn">Yeni Sohbet Başlat</button>
        </section>
        <section>
            <h2>Kullanım Grafiği</h2>
            <canvas id="usageChart"></canvas>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
