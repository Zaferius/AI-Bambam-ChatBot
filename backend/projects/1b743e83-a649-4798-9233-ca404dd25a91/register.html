<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Zone - Kayıt Ol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Kayıt Ol</h1>
    </header>
    <main class="flex justify-center items-center h-screen">
        <form action="login.html" method="post" class="bg-white p-8 rounded shadow-md w-1/3">
            <label for="username" class="block mb-2">Kullanıcı Adı:</label>
            <input type="text" id="username" name="username" required class="w-full p-2 border border-gray-300 rounded mb-4">
            <label for="email" class="block mb-2">E-posta:</label>
            <input type="email" id="email" name="email" required class="w-full p-2 border border-gray-300 rounded mb-4">
            <label for="password" class="block mb-2">Şifre:</label>
            <input type="password" id="password" name="password" required class="w-full p-2 border border-gray-300 rounded mb-4">
            <button type="submit" class="w-full bg-green-500 text-white py-2 rounded hover:bg-green-700">Kayıt Ol</button>
        </form>
        <p class="mt-4">Zaten üye misiniz? <a href="login.html" class="text-blue-500">Giriş Yapın</a></p>
    </main>
</body>
</html>
