<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Zone - Ana Sayfa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="globals.css">
</head>
<body>
    <header>
        <h1>Upload Zone</h1>
    </header>
    <main>
        <section id="hero">
            <h2>AI ile Dosya Yükleme ve Analiz Etme</h2>
            <p>Basit, hızlı ve güvenli bir şekilde dosyalarınızı yükleyin ve analiz edin.</p>
        </section>
        <section id="upload">
            <h2>Dosya Yükleme</h2>
            <form id="upload-form" enctype="multipart/form-data">
                <input type="file" id="file-input" name="file" required>
                <button type="submit" class="btn">Dosyayı Yükle</button>
                <h3 id="status-message">Henüz bir dosya yüklemediniz.</h3>
            </form>
        </section>
        <footer>
            <p>&copy; 2023 Upload Zone. Tüm Hakları Saklıdır.</p>
        </footer>
    </main>
    <script src="script.js"></script>

    <!-- Auto-generated missing elements -->
    <div id="upload-message"></div>
    <script src="settings.js"></script>
</body>
</html>
