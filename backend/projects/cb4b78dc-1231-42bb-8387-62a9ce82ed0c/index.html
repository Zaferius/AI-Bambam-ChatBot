<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG to JPEG Dönüştürücü</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>PNG'den JPEG'e Dönüştürücü</h1>
    </header>
    <main>
        <section class="converter">
            <input type="file" accept=".png" id="fileInput">
            <button id="convertButton">Dönüştür</button>
            <div id="result"></div>
        </section>
    </main>
    <footer>
        <p>Tüm hakları saklıdır &copy; 2023</p>
    </footer>
</body>
</html>
